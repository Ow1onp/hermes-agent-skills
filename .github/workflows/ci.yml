name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: Test (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  validate-skills:
    needs: lint
    runs-on: ubuntu-latest
    name: Validate SKILL.md Files
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate all SKILL.md files
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'src')
          from hermes_agent_skills.validator import SkillValidator

          v = SkillValidator(strict=False)
          results = v.validate_directory('skills')
          failures = [r for r in results if not r.valid]

          print(f'Checked {len(results)} skill(s)')
          for r in results:
              status = 'PASS' if r.valid else 'FAIL'
              print(f'  [{status}] {r.path}')

          if failures:
              print(f'\n{len(failures)} skill(s) failed validation:')
              for r in failures:
                  print(r.summary())
              sys.exit(1)
          else:
              print('\nAll skills passed validation!')
          "

  security:
    needs: lint
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit
        continue-on-error: true

  install-gate:
    needs: test
    runs-on: ubuntu-latest
    name: Install & Smoke Test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and install
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --wheel
          pip install dist/*.whl

      - name: Verify imports
        run: |
          python -c "import hermes_agent_skills; print('v1 OK:', hermes_agent_skills.__version__)"
          python -c "import cli; print('cli OK')"
          python -c "import hermes_v2; print('v2 OK:', hermes_v2.__version__)"

      - name: v1 smoke test
        run: |
          hermes-skill --help
          hermes-skill validate skills/
          hermes-skill list skills/

      - name: v2 smoke test
        run: |
          python -m hermes_v2.cli --dry-run "帮我发布项目" | grep publish_project
          python -m hermes_v2.cli --dry-run "创建一个 FastAPI 项目" | grep create_project

